<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Діма Найда</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #F7F3EE;
      --white:        #FFFFFF;
      --text:         #1C1915;
      --muted:        #7A6B62;
      --border:       #E5DDD5;
      --accent:       #F2E000;
      --accent-light: #FDFBCC;
      --wa:           #25D366;
      --spotify:      #1DB954;
    }

    html { font-size: 17px; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LANGUAGE SWITCHER ── */
    .lang-switch {
      position: fixed; top: .8rem; right: .8rem; z-index: 600;
      display: flex;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 10px rgba(28,25,21,.12);
      overflow: hidden;
    }
    .lang-btn {
      padding: .32rem .7rem;
      font-size: .74rem; font-weight: 700; letter-spacing: .04em;
      border: none; background: none; cursor: pointer;
      color: var(--muted); font-family: inherit;
      transition: color .15s, background .15s;
    }
    .lang-btn.active { background: var(--accent); color: var(--text); }
    .lang-btn:not(.active):hover { color: var(--text); }

    /* ── PROFILE CARD ── */
    .profile-card {
      position: relative; width: 100%; max-width: 480px;
      margin: 0 auto; border-radius: 0 0 24px 24px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(28,25,21,.22), 0 2px 8px rgba(28,25,21,.08);
    }
    .profile-photo { width: 100%; height: 580px; overflow: hidden; background: #c8bfb4; }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
    .profile-photo .photo-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; color: #8a7e74; font-size: .85rem;
    }
    .profile-photo .photo-placeholder span:first-child { font-size: 3rem; }
    .profile-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 4rem 1.5rem 1.6rem;
      background: linear-gradient(to top, rgba(28,18,10,.82) 0%, rgba(28,18,10,.3) 55%, transparent 100%);
    }
    .profile-name    { font-size: 2.1rem; font-weight: 800; color: #fff; letter-spacing: -.025em; line-height: 1.1; }
    .profile-tagline { font-size: .88rem; color: rgba(255,255,255,.75); margin-top: .35rem; letter-spacing: .01em; }

    /* ── INFO CHIPS ── */
    .info-chips {
      display: flex; flex-wrap: wrap; gap: .45rem;
      padding: 1.1rem 1rem; background: var(--white);
      max-width: 480px; margin: 0 auto;
      border-top: 1px solid var(--border);
    }
    .chip {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .8rem; color: var(--text);
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 999px; padding: .28rem .85rem; font-weight: 500;
    }
    .chip.chip-accent { background: var(--accent); border-color: var(--accent); color: var(--text); font-weight: 700; }

    /* ── MAIN COLUMN ── */
    .main { max-width: 480px; margin: 0 auto; padding-bottom: 6rem; }

    /* ── CARD BASE ── */
    .card {
      background: var(--white); margin: .7rem 1rem 0;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(28,25,21,.05), 0 4px 14px rgba(28,25,21,.07);
    }
    .card-header {
      display: flex; align-items: center; gap: .6rem;
      padding: 1rem 1.2rem .45rem;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase; color: var(--muted);
    }
    .card-dot {
      width: 26px; height: 26px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0;
    }
    .card-dot.spotify { background: var(--spotify); }
    .card-body { padding: .15rem 1.2rem 1rem; font-size: .98rem; color: #2E2820; line-height: 1.78; }
    .card-body p { margin-bottom: .6rem; }
    .card-body p:last-child { margin-bottom: 0; }
    .card-body p em { font-style: italic; color: var(--text); }
    .card-body ul { margin: .4rem 0 0 1.1rem; }
    .card-body li { margin-bottom: .35rem; }

    /* ── CONTACT CARD ── */
    .contact-card {
      background: var(--white); margin: .7rem 1rem 0;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(28,25,21,.05), 0 4px 14px rgba(28,25,21,.07);
    }
    .contact-header {
      display: flex; align-items: center; gap: .6rem;
      padding: 1rem 1.2rem .9rem;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase; color: var(--muted);
    }
    .c-divider { height: 1px; background: var(--border); margin: 0 1.2rem; }

    /* Instagram row */
    .ig-row { display: flex; align-items: center; gap: .9rem; padding: 1rem 1.2rem; }
    .ig-avatar {
      width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
      padding: 2px;
      background: linear-gradient(135deg, #f09433, #dc2743, #bc1888);
    }
    .ig-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; border: 2.5px solid #fff; }
    .ig-avatar .ig-avatar-ph { width: 100%; height: 100%; border-radius: 50%; background: #e8e0d5; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; border: 2.5px solid #fff; }
    .ig-info { flex: 1; min-width: 0; }
    .ig-username { font-size: .95rem; font-weight: 700; display: block; color: var(--text); }
    .ig-subline  { font-size: .78rem; color: var(--muted); margin-top: .06rem; }
    .ig-actions  { display: flex; gap: .45rem; margin-top: .55rem; }
    .ig-btn {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .36rem .9rem; border-radius: 8px; font-size: .78rem; font-weight: 700;
      text-decoration: none; letter-spacing: .01em;
      transition: opacity .2s, transform .15s; white-space: nowrap;
    }
    .ig-btn:hover { opacity: .85; transform: translateY(-1px); }
    .ig-btn-message { color: #fff; background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); box-shadow: 0 2px 8px rgba(131,58,180,.3); }
    .ig-btn-follow  { color: var(--text); background: var(--bg); border: 1.5px solid var(--border); }

    /* Contact rows */
    .contact-row { display: flex; align-items: center; gap: .75rem; padding: 1rem 1.2rem; text-decoration: none; color: inherit; transition: background .15s; cursor: pointer; }
    .contact-row:last-child { padding-bottom: 1.2rem; }
    .contact-row:hover  { background: var(--bg); }
    .contact-row:active { background: var(--border); }
    .contact-row-icon   { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; flex-shrink: 0; }
    .contact-row-detail { min-width: 0; flex: 1; }
    .contact-row-label  { font-size: .67rem; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; font-weight: 700; display: block; margin-bottom: .05rem; }
    .contact-row-value  { font-size: .9rem; font-weight: 600; color: var(--text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-row-arrow  { font-size: 1.25rem; color: var(--border); flex-shrink: 0; margin-left: .25rem; font-weight: 300; transition: color .15s, transform .15s; }
    .contact-row:hover .contact-row-arrow { color: var(--muted); transform: translateX(2px); }

    /* ── VIBE NOTE ── */
    .vibe-note {
      max-width: 480px; margin: .9rem 1rem 0;
      font-size: .88rem; color: var(--muted); font-style: italic;
      text-align: center; line-height: 1.65; padding: 0 .5rem;
    }

    /* ── MINI GALLERY ── */
    .gallery { padding: .7rem 1.2rem 1.2rem; border-top: 1px solid var(--border); }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; border-radius: 9px; overflow: hidden; }
    .gallery-thumb { aspect-ratio: 1; overflow: hidden; background: #ddd7cf; cursor: pointer; position: relative; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .22s; }
    .gallery-thumb:hover img { transform: scale(1.07); }
    .gallery-thumb .thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #a09890; font-size: 1.4rem; }
    .gallery-thumb.is-video::after { content: '▶'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,.55); pointer-events: none; }
    .gallery-thumb.more-overlay::after { content: attr(data-label); position: absolute; inset: 0; background: rgba(28,25,21,.54); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 700; cursor: pointer; text-shadow: none; }
    .gallery-cta { display: block; margin-top: .6rem; font-size: .78rem; font-weight: 600; color: var(--muted); text-align: right; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; transition: color .15s; }
    .gallery-cta:hover { color: var(--text); }

    /* ── PHOTO PAIR ── */
    .photo-pair-card {
      margin: .7rem 1rem 0; border-radius: 14px; overflow: hidden;
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(28,25,21,.05), 0 4px 14px rgba(28,25,21,.07);
    }
    .photo-pane { overflow: hidden; aspect-ratio: 3/4; background: #c8bfb4; position: relative; }
    .photo-pane img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-pane .photo-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .4rem; color: #8a7e74; font-size: .78rem; text-align: center; padding: 1rem; }
    .photo-pane .photo-placeholder span:first-child { font-size: 1.6rem; }
    .photo-pane-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 2.2rem .7rem .55rem;
      background: linear-gradient(to top, rgba(28,18,10,.72) 0%, transparent 100%);
      font-size: .64rem; font-weight: 600; color: rgba(255,255,255,.9);
      letter-spacing: .03em; line-height: 1.45;
    }

    /* ── TAGS ── */
    .tags-card {
      background: var(--white); margin: .7rem 1rem 0;
      border-radius: 14px; padding: 1rem 1.2rem 1.2rem;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(28,25,21,.05), 0 4px 14px rgba(28,25,21,.07);
    }
    .tags-label { font-size: .68rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: .8rem; }
    .tags { display: flex; flex-wrap: wrap; gap: .45rem; }
    .tag { font-size: .82rem; color: var(--text); background: var(--bg); border: 1.5px solid var(--border); border-radius: 999px; padding: .3rem .9rem; font-weight: 500; }

    /* ── SPOTIFY ── */
    .spotify-card {
      background: var(--white); margin: .7rem 1rem 0;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(28,25,21,.05), 0 4px 14px rgba(28,25,21,.07);
    }
    .spotify-header { display: flex; align-items: center; gap: .6rem; padding: 1rem 1.2rem .75rem; font-size: .68rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
    .spotify-card iframe { display: block; }

    /* ── STICKY CTA + HINT ── */
    .sticky-group {
      position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      z-index: 500; display: flex; flex-direction: column; align-items: center; gap: .35rem;
      transition: opacity .3s;
    }
    .sticky-group.hidden { opacity: 0; pointer-events: none; }
    .sticky-cta {
      display: flex; align-items: center; gap: .5rem;
      background: var(--accent); color: var(--text);
      font-size: .9rem; font-weight: 800; letter-spacing: .01em;
      padding: .78rem 1.75rem; border-radius: 999px;
      box-shadow: 0 4px 24px rgba(242,224,0,.45), 0 1px 4px rgba(28,25,21,.12);
      cursor: pointer; border: none; font-family: inherit; white-space: nowrap;
      transition: transform .2s, box-shadow .2s;
    }
    .sticky-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(242,224,0,.5), 0 2px 8px rgba(28,25,21,.12); }
    .sticky-hint {
      font-size: .74rem; color: var(--muted);
      background: rgba(247,243,238,.92); backdrop-filter: blur(8px);
      border-radius: 999px; padding: .2rem .75rem;
      white-space: nowrap; text-align: center;
    }

    /* ── LIGHTBOX ── */
    .lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(18,14,10,.92); flex-direction: column; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox-inner { position: relative; width: min(480px, 96vw); max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 .25rem .5rem; }
    .lightbox-close { position: fixed; top: 1rem; right: 1rem; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff; font-size: 1.3rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: background .2s; }
    .lightbox-close:hover { background: rgba(255,255,255,.22); }
    .lightbox-title { color: rgba(255,255,255,.7); font-size: .68rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; text-align: center; margin-bottom: .8rem; }
    .lightbox-grid { display: flex; flex-direction: column; gap: 6px; }
    .lightbox-grid img { width: 100%; height: auto; display: block; border-radius: 10px; }
    .lightbox-grid .lb-video-wrap { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; overflow: hidden; border-radius: 10px; }
    .lightbox-grid .lb-video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lightbox-grid .lb-placeholder { aspect-ratio: 3/4; background: #1e1a16; display: flex; align-items: center; justify-content: center; color: #4a4540; font-size: 1.8rem; border-radius: 10px; }

    /* ── FOOTER ── */
    footer { max-width: 480px; margin: 2rem auto 0; padding: 1.5rem 1rem; font-size: .76rem; color: var(--muted); text-align: center; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <!-- LANGUAGE SWITCHER -->
  <div class="lang-switch">
    <button class="lang-btn" id="btn-uk" onclick="setLang('uk')">UA</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <!-- PROFILE CARD -->
  <div class="profile-card">
    <div class="profile-photo">
      <img src="photos/thumbs/hero.jpg" alt="Dima Naida"
        fetchpriority="high" decoding="async"
        onerror="this.parentElement.innerHTML='<div class=photo-placeholder><span>🏔️</span><span>Add photos/recent.jpg</span></div>'">
    </div>
    <div class="profile-overlay">
      <h1 class="profile-name" data-t="profileName"></h1>
      <p class="profile-tagline" data-t="profileTagline"></p>
    </div>
  </div>

  <!-- INFO CHIPS -->
  <div class="info-chips">
    <span class="chip" data-t="chipActivity"></span>
    <span class="chip" data-t="chipLocation"></span>
    <span class="chip" id="age-chip"></span>
  </div>

  <main class="main">

    <!-- PHOTO PAIR -->
    <div class="photo-pair-card">
      <div class="photo-pane">
        <img src="photos/thumbs/pair-recent.jpg" alt="Dima — recent" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=photo-placeholder><span>📷</span><span>recent.jpg</span></div>'">
        <div class="photo-pane-label" data-t="recentLabel"></div>
      </div>
      <div class="photo-pane">
        <img src="photos/thumbs/pair-in-spain.jpg" alt="Dima — in Spain" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=photo-placeholder><span>🌊</span><span>in-spain.jpg</span></div>'">
        <div class="photo-pane-label" data-t="inSpainLabel"></div>
      </div>
    </div>

    <!-- PROMPT: HOBBIES -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot">🌈</div>
        <span data-t="hobbyHeader"></span>
      </div>
      <div class="card-body" data-t-html="hobbyBody"></div>
      <div class="gallery" id="gallery-crossfit-preview"></div>
      <div class="gallery" id="gallery-food-preview"></div>
    </div>

    <!-- TAGS -->
    <div class="tags-card">
      <p class="tags-label" data-t="tagsLabel"></p>
      <div class="tags" id="tags-list"></div>
    </div>

    <!-- PROMPT: ALTERNATE CAREER -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot">🧑‍🏫</div>
        <span data-t="careerHeader"></span>
      </div>
      <div class="card-body">
        <p data-t-html="careerBody"></p>
      </div>
      <div class="gallery" id="gallery-travel-preview"></div>
    </div>

    <!-- PROMPT: TALK FOR HOURS -->
    <div class="card">
      <div class="card-header">
        <div class="card-dot">💬</div>
        <span data-t="talkHeader"></span>
      </div>
      <div class="card-body" data-t-html="talkBody"></div>
    </div>

    <!-- VIBE NOTE -->
    <p class="vibe-note" data-t="vibeNote"></p>

    <!-- GET IN TOUCH (moved after story) -->
    <div class="contact-card" id="contact">
      <div class="contact-header">
        <div class="card-dot">✉️</div>
        <span data-t="contactHeader"></span>
      </div>

      <div class="ig-row">
        <div class="ig-avatar">
          <img src="photos/thumbs/pair-recent.jpg" alt="@cadet93000" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=ig-avatar-ph>👤</div>'">
        </div>
        <div class="ig-info">
          <span class="ig-username">@cadet93000</span>
          <p class="ig-subline" data-t="igSubline"></p>
          <div class="ig-actions">
            <a class="ig-btn ig-btn-message" href="https://ig.me/m/cadet93000" target="_blank" rel="noopener noreferrer" data-t="igDm"></a>
            <a class="ig-btn ig-btn-follow"  href="https://www.instagram.com/cadet93000" target="_blank" rel="noopener noreferrer" data-t="igFollow"></a>
          </div>
        </div>
      </div>

      <div class="c-divider"></div>

      <a class="contact-row" href="https://wa.me/4917620082850" target="_blank" rel="noopener noreferrer">
        <div class="contact-row-icon" style="background:#E7FBF0;">💬</div>
        <div class="contact-row-detail">
          <span class="contact-row-label" data-t="waLabel"></span>
          <span class="contact-row-value">+49 176 2008 2850</span>
        </div>
        <span class="contact-row-arrow">›</span>
      </a>

      <div class="c-divider"></div>

      <a class="contact-row" href="mailto:dmytro.naida@icloud.com">
        <div class="contact-row-icon" style="background:#EEF2FF;">📧</div>
        <div class="contact-row-detail">
          <span class="contact-row-label" data-t="emailLabel"></span>
          <span class="contact-row-value">dmytro.naida@icloud.com</span>
        </div>
        <span class="contact-row-arrow">›</span>
      </a>
    </div>

    <!-- SPOTIFY -->
    <div class="spotify-card">
      <div class="spotify-header">
        <div class="card-dot spotify">🎵</div>
        <span data-t="spotifyHeader"></span>
      </div>
      <iframe
        data-testid="embed-iframe"
        style="border-radius:0 0 14px 14px"
        src="https://open.spotify.com/embed/playlist/4UenN9KEuw35eCxEHNLo8x?utm_source=generator"
        width="100%" height="352" frameBorder="0" allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"
      ></iframe>
    </div>

  </main>

  <footer data-t="footer"></footer>

  <!-- STICKY CTA + HINT -->
  <div class="sticky-group hidden" id="sticky-group">
    <button class="sticky-cta" onclick="scrollToContact()" data-t="ctaText"></button>
    <p class="sticky-hint" data-t="ctaHint"></p>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-inner">
      <p class="lightbox-title" id="lb-title"></p>
      <div class="lightbox-grid" id="lb-grid"></div>
    </div>
  </div>

  <script>
    // ── Translations ──
    const T = {
      uk: {
        profileName:    '👋 Привіт! Я Діма',
        profileTagline: 'Чорновбривий син Сумщини. Живу в Мюнхені.',
        chipActivity:   '🥾 Переживший Каміно',
        chipLocation:   '📍 Мюнхен',
        contactHeader:  "Зв'яжись зі мною",
        igSubline:      'Instagram — фото з Каміно і те, що смішно о 7 ранку',
        igDm:           'Написати',
        igFollow:       'Підписатись',
        waLabel:        'WhatsApp',
        emailLabel:     'Електронна пошта',
        hobbyHeader:    'Коли я не на роботі, я люблю…',
        hobbyBody:      '<p>Більшість ранків — кросфіт. Більшість вихідних — пошук пісні, яку буду слухати 40 разів поспіль.</p><p>Минулого травня пройшов 125 км по північній Іспанії за п\'ять днів — надмірно, але потрібно. Нагорода наприкінці — гарний сніданок.</p><p>Я нерозумно відданий млинцям з маскарпоне. Я готував їх рівно для трьох людей. Всі три просили рецепт. Я не дав нікому.</p>',

        careerHeader:   'Моя альтернативна кар\'єра…',
        careerBody:     'Викладання. Я завжди вважав, що вчителі, які змінювали чиєсь життя, насправді викладали не предмет — вони викладали людині. Хотів би бути таким. Мабуть, математика. Можливо, українська.',

        vibeNote:       'Якщо ти з тих, хто має тверду думку про каву і хоч одне дивне захоплення, про яке не одразу розповідаєш — ми поладнаємо.',
        spotifyHeader:  'На репіті цього тижня — якщо ненавидиш, скажи чим замінити.',

        ctaText:        'Написати в Instagram',
        ctaHint:        'Навіть «бачила твої фото» — підходить.',
        footer:         'Діма Найда · 2026',
        seeAll:         k => ({ crossfit: 'Всі CrossFit →', travel: 'Всі фото →', food: 'Всі страви →' }[k]),
        galleryTitles:  { crossfit: '🏋️ CrossFit', travel: 'Каміно де Сантьяго · травень 2025', food: '🍳 Те, що готую' },
        ageLabel:       age => age + ' ' + ageWordUk(age),
      },
      en: {
        profileName:    "👋 Hi! I'm Dima",
        profileTagline: 'Walked 125km across Spain. Moved to Munich. Still figuring out the pancake-to-CrossFit ratio.',
        chipActivity:   '🥾 Camino survivor',
        chipLocation:   '📍 Munich',
        contactHeader:  'Get in touch',
        igSubline:      'Instagram — Camino photos and things I thought were funny before coffee.',
        igDm:           'DM me',
        igFollow:       'Follow',
        waLabel:        'WhatsApp',
        emailLabel:     'Email',
        hobbyHeader:    "When I'm not at work, I love to…",
        hobbyBody:      "<p>Most mornings start with CrossFit. Most weekends I'm hunting for a song I'll play 40 times in a row.</p><p>Last May I walked 125km across northern Spain in five days — which I'd call excessive, but it felt necessary. The reward at the end was a good breakfast.</p><p>I'm unreasonably committed to mascarpone pancakes. I have made them for exactly three people. All three asked for the recipe. I have not given it to anyone.</p>",

        tags:           ['🏋️ CrossFit', '🥾 Long walks', '🎵 Music hunting', '🥞 Cooking', '✈️ Travel', '🌍 Spain'],

        careerBody:     "Teaching. I've always believed the teachers who changed people's lives weren't really teaching the subject — they were teaching the person. I'd want to be that kind. Probably math. Possibly Ukrainian.",

        vibeNote:       "If you're the kind of person who has a strong opinion about coffee orders and at least one very weird interest you don't tell people about right away — we'll probably get along.",
        spotifyHeader:  "On repeat this week — hate it? Tell me what you'd replace it with.",
        recentLabel:    'Munich, March 2025',
        inSpainLabel:   'Day 4 · 90km in · worth it',
        ctaText:        'Say hi on Instagram',
        ctaHint:        "Even 'I saw your Spain photos' works.",
        footer:         'Dima Naida · 2026',
        seeAll:         k => ({ crossfit: 'See all CrossFit →', travel: 'See all photos →', food: 'See all food →' }[k]),
        galleryTitles:  { crossfit: '🏋️ CrossFit', travel: 'Camino de Santiago · May 2025', food: '🍳 Things I cook' },
        ageLabel:       age => age + ' years old',
      }
    };

    function ageWordUk(n) {
      const last2 = n % 100, last1 = n % 10;
      if (last2 >= 11 && last2 <= 19) return 'років';
      if (last1 === 1) return 'рік';
      if (last1 >= 2 && last1 <= 4) return 'роки';
      return 'років';
    }

    function calcAge() {
      const bd = new Date(1993, 2, 10);
      const now = new Date();
      let age = now.getFullYear() - bd.getFullYear();
      if (now < new Date(now.getFullYear(), 2, 10)) age--;
      return age;
    }

    let currentLang = localStorage.getItem('lang') || 'uk';

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;

      const t = T[lang];
      const age = calcAge();

      document.querySelectorAll('[data-t]').forEach(el => {
        el.textContent = t[el.dataset.t] || '';
      });

      document.querySelectorAll('[data-t-html]').forEach(el => {
        el.innerHTML = t[el.dataset.tHtml] || '';
      });

      document.getElementById('age-chip').textContent = '🎂 ' + t.ageLabel(age);

      document.getElementById('tags-list').innerHTML =
        t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

      renderPreviews();

      document.getElementById('btn-uk').classList.toggle('active', lang === 'uk');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }

    // ── Gallery data ──
    const galleries = {
      crossfit: {
        emoji: '🏋️',
        items: [
          'photos/crossfit-1.jpg',
          'photos/crossfit-2.mp4',
        ]
      },
      travel: {
        emoji: '✈️',
        items: [
          'photos/travel-1.jpg','photos/travel-2.jpg','photos/travel-3.jpg',
          'photos/travel-4.jpg','photos/travel-5.jpg','photos/travel-6.jpg',
          'photos/travel-7.jpg','photos/travel-8.jpg',
          'photos/travel-9.mp4','photos/travel-10.mp4',
        ]
      },
      food: {
        emoji: '🍳',
        items: [
          'photos/food-1.jpg','photos/food-2.jpg','photos/food-3.jpg',
          'photos/food-4.jpg','photos/food-5.jpg','photos/food-6.jpg',
          'photos/food-7.jpg',
        ]
      }
    };

    function isVideo(src) { return /\.(mp4|mov|webm)$/i.test(src); }

    function thumbSrc(src) {
      const t = src.replace('photos/', 'photos/thumbs/');
      return isVideo(src) ? t.replace(/\.(mp4|mov|webm)$/i, '-poster.jpg') : t;
    }

    function thumbHTML(src, key, index, isLast, total) {
      const extra = isLast && total > 3 ? ` more-overlay" data-label="+ ${total - 2} more` : '';
      const vidClass = isVideo(src) ? ' is-video' : '';
      const media = `<img src="${thumbSrc(src)}" alt="" loading="lazy"
        onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>${galleries[key].emoji}</div>'">`;
      return `<div class="gallery-thumb${vidClass}${extra}" onclick="openLightbox('${key}',${index})">${media}</div>`;
    }

    function renderPreviews() {
      const t = T[currentLang];
      Object.entries(galleries).forEach(([key, g]) => {
        const el = document.getElementById(`gallery-${key}-preview`);
        if (!el) return;
        const preview = g.items.slice(0, 3);
        const thumbs = preview.map((src, i) => thumbHTML(src, key, i, i === 2, g.items.length)).join('');
        el.innerHTML = `<div class="gallery-grid">${thumbs}</div>
          <button class="gallery-cta" onclick="openLightbox('${key}',0)">${t.seeAll(key)}</button>`;
      });
    }

    function lbItemHTML(src, key) {
      if (isVideo(src)) {
        return `<div class="lb-video-wrap">
          <video autoplay muted loop playsinline preload="metadata" poster="${thumbSrc(src)}"
            style="width:100%;height:100%;object-fit:cover">
            <source src="${src}" type="video/mp4">
          </video>
        </div>`;
      }
      return `<img src="${thumbSrc(src)}" data-full="${src}" alt=""
        onerror="this.innerHTML='<div class=lb-placeholder>${galleries[key].emoji}</div>'">`;
    }

    function openLightbox(key) {
      document.getElementById('lb-title').textContent = T[currentLang].galleryTitles[key];
      document.getElementById('lb-grid').innerHTML = galleries[key].items.map(src => lbItemHTML(src, key)).join('');
      document.querySelectorAll('#lb-grid img[data-full]').forEach(img => {
        const full = new Image();
        full.onload = () => { img.src = img.dataset.full; };
        full.src = img.dataset.full;
      });
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.querySelectorAll('#lb-grid video').forEach(v => v.pause());
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function closeLightboxOnBg(e) {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ── Sticky CTA ── observe contact section; show group when contact scrolls off screen
    const stickyGroup = document.getElementById('sticky-group');
    new IntersectionObserver(
      ([e]) => stickyGroup.classList.toggle('hidden', e.isIntersecting),
      { threshold: 0.2 }
    ).observe(document.getElementById('contact'));

    function scrollToContact() {
      document.getElementById('contact').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    setLang(currentLang);
  </script>

</body>
